services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: orders
      POSTGRES_PASSWORD: dev
    ports: ["5432:5432"]
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
    ports: ["9092:9092"]
  api:
    build: { context: ., dockerfile: src/Acme.Orders.Api/Dockerfile }
    environment:
      ConnectionStrings__Orders: Host=postgres;Database=orders;Username=postgres;Password=dev
      Kafka__BootstrapServers: kafka:9092
    depends_on: [postgres, kafka]
    ports: ["8080:8080"]
  worker:
    build: { context: ., dockerfile: src/Acme.Orders.Worker/Dockerfile }
    environment:
      ConnectionStrings__Orders: Host=postgres;Database=orders;Username=postgres;Password=dev
      Kafka__BootstrapServers: kafka:9092
    depends_on: [postgres, kafka]
